<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>M3U8 Player</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta/css/bootstrap.min.css">

    <!-- Estilos -->
    <style>
        body {
            background-color: gray;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #text-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
        }

        .page-name {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div id="text-box">
        <h1 class="page-name">M3U8 Player</h1>

        <div class="input-group">
            <input type="text" class="form-control" placeholder="Pega el link m3u8 aquí" id="m3u8-placeholder">
            <div class="input-group-append">
                <button class="btn btn-primary" type="button" id="play-btn">Play</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="https://unpkg.com/popper.js@1.12.3"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta/js/bootstrap.min.js"></script>

</body>
</html>
